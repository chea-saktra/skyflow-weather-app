<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-app</title>
  </head>
  <body>
    <aside id="side-menu" class="side-menu">
      <nav class="side-menu__nav">
        <a href="#" class="side-menu__logo-link"
          ><img src="/Logo.png" alt="Weather App Logo" class="side-menu__logo"
        /></a>
        <ul class="side-menu__list">
          <li class="side-menu__item">
            <a href="#" class="side-menu__link">Home</a>
          </li>
          <li class="side-menu__item">
            <a href="#" class="side-menu__link">Favorites</a>
          </li>
          <li class="side-menu__item">
            <a href="#" class="side-menu__link">History</a>
          </li>
          <li class="side-menu__item">
            <a href="#" class="side-menu__link"> Settings </a>
          </li>
        </ul>
      </nav>
      <p class="side-menu__copyright">&copy; 2026 Weather App</p>
    </aside>
    <main>
      <header class="mobile-header">
        <button
          id="menu-toggle"
          class="mobile-header__btn"
          aria-label="Open Menu"
        >
          <i data-lucide="menu"></i>
        </button>
        <h1 class="mobile-header__location">
          Phnom Penh <i data-lucide="map-pin"></i>
        </h1>
        <button
          id="fav-toggle"
          class="mobile-header__btn"
          aria-label="Add to Favorites"
        >
          <i data-lucide="star"></i>
        </button>
      </header>

      <section id="search" class="search-panel">
        <form class="search-panel__form" role="search" onsubmit="return false;">
          <button
            type="button"
            class="search-panel__btn-back"
            aria-label="Go back"
          >
            <i data-lucide="arrow-left"></i>
          </button>

          <div class="search-panel__input-wrapper">
            <i
              data-lucide="search"
              class="search-panel__search-icon"
              aria-hidden="true"
            ></i>

            <input
              type="search"
              name="search"
              id="search-input"
              class="search-panel__input"
              placeholder="Search City..."
              aria-label="Search City"
              value="Phmon Penh"
            />
            <button class="search-panel__btn-clear" aria-label="Clear search">
              <i data-lucide="circle-x"></i>
            </button>
          </div>
        </form>
      </section>

      <section id="current-weather" class="current-weather">
        <div class="current-weather__info">
          <p class="current-weather__temperature">32 <sup>°C</sup></p>
          <h2 class="current-weather__status">Partly Cloudy</h2>
        </div>
        <div class="current-weather__visual">
          <img src="/cloudy.png" alt="Partly Cloudy Visual" class="current-weather__img" />
        </div>
      </section>

      <section id="weather-details" class="weather-details">
        <dl class="weather-details__container">
          <div class="weather-details__item">
            <dd class="weather-details__value">
              <i
                data-lucide="droplet"
                class="weather-details__icon"
                aria-hidden="true"
              ></i>
              <span>68%</span>
            </dd>
            <dt class="weather-details__label">Humidity</dt>
          </div>

          <div class="weather-details__item">
            <dd class="weather-details__value">
              <i
                data-lucide="wind"
                class="weather-details__icon"
                aria-hidden="true"
              ></i>
              <span>12 km/h</span>
            </dd>
            <dt class="weather-details__label">Wind</dt>
          </div>

          <div class="weather-details__item">
            <dd class="weather-details__value">
              <i
                data-lucide="thermometer"
                class="weather-details__icon"
                aria-hidden="true"
              ></i>
              <span>35<sup>°C</sup></span>
            </dd>
            <dt class="weather-details__label">Feels like</dt>
          </div>
        </dl>
      </section>
      <section id="forecast" class="forecast">
        <h3 class="forecast__title">7-Day Forecast</h3>
        <ul class="forecast__list">
          <li class="forecast__item">
            <time datetime="2026-06-27" class="forecast__day">Fri 27</time>
            <div class="forecast__icon-wrapper">
              <i
                data-lucide="cloud-rain"
                class="forecast__icon"
                aria-hidden="true"
              ></i>
            </div>
            <div class="forecast__temps">
              <span class="forecast__temp forecast__temp--max">31°</span
              ><span class="forecast__temp forecast__temp--min">24°</span>
            </div>
          </li>

          <li class="forecast__item">
            <time datetime="2026-06-28" class="forecast__day">Sat 28</time>
            <div class="forecast__icon-wrapper">
              <i
                data-lucide="sun"
                class="forecast__icon"
                aria-hidden="true"
              ></i>
            </div>
            <div class="forecast__temps">
              <span class="forecast__temp forecast__temp--max">33°</span>
              <span class="forecast__temp forecast__temp--min">25°</span>
            </div>
          </li>
        </ul>
      </section>
    </main>
    <nav class="bottom-nav">
      <a
        href="#home"
        class="bottom-nav__item bottom-nav__item--active"
        aria-label="Home"
      >
        <i data-lucide="home"></i>
      </a>
      <a href="#favorites" class="bottom-nav__item" aria-label="Favorites">
        <i data-lucide="star"></i>
      </a>
      <a href="#history" class="bottom-nav__item" aria-label="Histrory">
        <i data-lucide="clock"></i>
      </a>
      <a href="#settings" class="bottom-nav__item" aria-label="Settings">
        <i data-lucide="settings"></i>
      </a>
    </nav>

    <script type="module" src="/src/main.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
