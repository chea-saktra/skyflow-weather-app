<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-app</title>
  </head>
  <body>
    <div class="app-container">
      <!-- SIDE MENU COMPONENT -->
      <aside class="side-menu">
        <nav class="side-menu__nav">
          <a href="/#home" class="side-menu__logo-link">
            <img src="/Logo.png" alt="Weather App Logo" class="side-menu__logo" />
            <span class="side-menu__logo-text">Weather</span>
          </a>
          <ul class="side-menu__list">
            <li class="side-menu__item">
              <a href="#home" class="side-menu__link is-active">
                <i class="side-menu__icon" data-lucide="home"></i>
                Home
              </a>
            </li>
            <li class="side-menu__item">
              <a href="#favorites" class="side-menu__link">
                <i class="side-menu__icon" data-lucide="star"></i>
                Favorites
              </a>
            </li>
            <li class="side-menu__item">
              <a href="#history" class="side-menu__link">
                <i class="side-menu__icon" data-lucide="clock"></i>
                History
              </a>
            </li>
            <li class="side-menu__item">
              <a href="#settings" class="side-menu__link">
                <i class="side-menu__icon" data-lucide="settings"></i>
                Settings
              </a>
            </li>
          </ul>
        </nav>
        <p class="side-menu__copyright">&copy; 2026 Weather App</p>
      </aside>

      <main class="main-content">
        <!-- MOBILE HEADER COMPONENT -->
        <header class="mobile-header">
          <button id="menu-toggle" class="mobile-header__btn" aria-label="Open Menu">
            <i data-lucide="menu"></i>
          </button>
          <h1 class="mobile-header__location">
            <i data-lucide="map-pin"></i>
          </h1>
          <button id="fav-toggle" class="mobile-header__btn" aria-label="Add to Favorites">
            <i data-lucide="star"></i>
          </button>
        </header>

        <div class="menu-overlay"></div>
        <!-- SEARCH PANEL COMPONENT -->
        <section class="search-panel is-hidden">
          <form class="search-panel__form" role="search">
            <button type="button" class="search-panel__btn--back" aria-label="Go back">
              <i data-lucide="arrow-left"></i>
            </button>

            <div class="search-panel__input-wrapper">
              <i data-lucide="search" class="search-panel__search-icon" aria-hidden="true"></i>

              <input
                type="search"
                name="search"
                id="search-input"
                class="search-panel__input"
                placeholder="Search City..."
                aria-label="Search City"
                value="" />
              <button type="button" class="search-panel__btn--clear" aria-label="Clear search">
                <i data-lucide="circle-x"></i>
              </button>
            </div>
          </form>

          <button class="search-panel__btn--location is-hidden">
            <i data-lucide="map-pin" class="mobile-header__btn-icon"></i>
            Use My location
          </button>
        </section>

        <article class="dashboard-layout">
          <!-- CURRENT WEATHER COMPONENT -->
          <section class="current-weather">
            <div class="current-weather__info">
              <div class="current-weather__location-wrapper is-hidden">
                <h1 class="current-weather__title">
                  <i data-lucide="map-pin"></i>
                </h1>
                <time class="current-weather__date"></time>
              </div>
              <div class="current-weather__temp-wrapper">
                <p class="current-weather__temperature"></p>
                <h2 class="current-weather__status"></h2>
              </div>
              <button id="desktop-fav-btn" class="current-weather__btn--add-fav is-hidden">
                <i data-lucide="star" class="fav-icon"></i>
                <span>Add to Favorites</span>
              </button>
            </div>
            <div class="current-weather__visual">
              <img src="" alt="" class="current-weather__img" />
            </div>
          </section>

          <!-- WEATHER DETAILS COMPONENT -->
          <section class="weather-details">
            <dl class="weather-details__container">
              <div class="weather-details__item">
                <dd class="weather-details__value">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="weather-details__icon">
                    <path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-13-7-13S5 10.7 5 15a7 7 0 0 0 7 7z" />
                  </svg>
                  <span class="weather-details__humidity"></span>
                </dd>
                <dt class="weather-details__label">Humidity</dt>
              </div>

              <div class="weather-details__item">
                <dd class="weather-details__value">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="weather-details__icon">
                    <path d="M12.8 19.6A2 2 0 1 0 14 16H2" />
                    <path d="M17.5 13a2.5 2.5 0 1 0-2.5-2.5H2" />
                    <path d="M9.8 4.4A2 2 0 1 1 11 8H2" />
                  </svg>
                  <span class="weather-details__wind"></span>
                </dd>
                <dt class="weather-details__label">Wind</dt>
              </div>

              <div class="weather-details__item">
                <dd class="weather-details__value">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="weather-details__icon">
                    <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0z" />
                  </svg>
                  <span class="weather-details__feels-like"></span>
                </dd>
                <dt class="weather-details__label">Feels like</dt>
              </div>
            </dl>
          </section>
        </article>

        <!-- FORECAST COMPONENT -->
        <section class="forecast">
          <h3 class="forecast__title">5-Day Forecast</h3>
          <ul class="forecast__list"></ul>
        </section>

        <!-- FAVORITES PANEL -->
        <section class="favorites-panel is-hidden" aria-labelledby="favorites-title"></section>

        <!-- HISTORY PANEL -->
        <section class="history-panel" aria-labelledby="history-title">l</section>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
